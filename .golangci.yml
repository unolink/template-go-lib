linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - misspell
    - revive
    - gocritic
    - bodyclose
    - noctx
    - prealloc
    - exportloopref

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
  gocritic:
    enabled-tags:
      - diagnostic
      - style

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
